# ── Database ──────────────────────────────────────────────────────────────────
# Set DATABASE_URL, DB_USERNAME, DB_PASSWORD in production (Railway/Render).
# Falls back to local H2 file DB if env vars are absent.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./amtrak_booking;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console — only active when using H2 driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:amtrak-super-secret-key-for-hs256-change-in-production-32chars}
jwt.expiration=86400000

server.port=${PORT:8080}

# ── Actuator (healthcheck for Railway) ────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Email (optional — set env vars to enable, leave blank to disable) ─────────
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
